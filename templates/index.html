{% extends "base.html" %}

{% block content %}
<section class="grid-container">
    {% for id, item in products.items() %}
    <article class="card">
        <h2>{{ item.name }}</h2>
        <p>{{ item.desc }}</p>
        <br>
        <a href="/product/{{ id }}" class="btn-link">View Details</a>
    </article>
    {% endfor %}
</section>
{% endblock %}
