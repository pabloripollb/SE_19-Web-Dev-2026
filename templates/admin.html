{% extends "base.html" %}

{% block content %}
<article class="card product-detail-card">
    <h1>Admin Panel</h1>
    <p>Write a new blog post.</p>
    <br>
    
    <form action="/admin" method="POST">
        <input type="text" name="title" placeholder="Blog Post Title" required style="margin-bottom: 10px; padding: 5px; width: 80%;"><br>
        <textarea name="content" placeholder="Write your post here..." required style="margin-bottom: 10px; padding: 5px; width: 80%; height: 150px;"></textarea><br>
        
        <button type="submit" style="padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;">Publish Post</button>
    </form>
    
    <hr style="margin: 30px 0;">
    
    <h2>Manage Existing Posts</h2>
    <ul style="text-align: left; list-style: none; padding: 0;">
        {% for post in posts %}
        <li style="margin-bottom: 15px; padding: 10px; background: #f9f9f9; border-radius: 5px;">
            <strong>{{ post.title }}</strong> <br>
            <a href="/admin/edit/{{ post.id }}" style="color: blue; text-decoration: none;">Edit</a> | 
            <a href="/admin/delete/{{ post.id }}" style="color: red; text-decoration: none;">Delete</a>
        </li>
        {% else %}
        <p>No posts to manage yet.</p>
        {% endfor %}
    </ul>
</article>
{% endblock %}
