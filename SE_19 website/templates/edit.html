{% extends "base.html" %}

{% block content %}
<article class="card product-detail-card">
    <h1>Edit Post</h1>
    <br>
    
    <form action="/admin/edit/{{ post.id }}" method="POST">
        <input type="text" name="title" value="{{ post.title }}" required style="margin-bottom: 10px; padding: 5px; width: 80%;"><br>
        <textarea name="content" required style="margin-bottom: 10px; padding: 5px; width: 80%; height: 150px;">{{ post.content }}</textarea><br>
        
        <button type="submit" style="padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer;">Update Post</button>
        <br><br>
        <a href="/admin" class="btn-link">Cancel</a>
    </form>
</article>
{% endblock %}
