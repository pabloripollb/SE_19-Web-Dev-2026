{% extends "base.html" %}

{% block content %}
<article class="card product-detail-card">
    <h1>{{ product.name }}</h1>
    <p class="price-tag">{{ product.price }}</p>
    <p>{{ product.desc }}</p>
    <br>
    <a href="/" class="btn-link">← Back to Products</a>
</article>
{% endblock %}
