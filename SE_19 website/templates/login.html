{% extends "base.html" %}

{% block content %}
<article class="card product-detail-card">
    <h1>Admin Login</h1>
    <br>
    
    <form action="/login" method="POST">
        <input type="password" name="password" placeholder="Enter Password" required style="margin-bottom: 10px; padding: 5px;"><br>
        <button type="submit" style="padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;">Login</button>
    </form>
</article>
{% endblock %}
